<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备激活与登录管理中心</title>
    <link rel="icon" href="https://picsum.photos/32/32" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
    
    <style>
        body {
            font-family: "Noto Sans SC", Tahoma, Arial, Roboto, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #ccfbf1 100%);
            transition: background 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 min-h-screen flex flex-col antialiased">

    <input type="file" id="album-picker" accept="image/*" class="hidden">

    <nav class="w-full max-w-md mx-auto px-4 pt-4 flex justify-between items-center z-10">
        <span class="text-sm font-bold tracking-wider text-teal-600 dark:text-teal-400">
            <i class="fa-solid fa-shield-halved mr-1"></i> 安全接入中心
        </span>
        <button id="theme-toggle" class="p-2 rounded-full glass-panel border border-white/20 shadow-sm hover:scale-105 transition-all">
            <i id="theme-icon" class="fas fa-moon text-gray-600 dark:text-yellow-400"></i>
        </button>
    </nav>

    <main class="flex-grow w-full max-w-md mx-auto px-4 py-4 space-y-4 pb-24">
        
        <div class="bg-red-50/90 dark:bg-red-950/40 border border-red-200 dark:border-red-900/60 rounded-2xl p-4 text-center relative overflow-hidden shadow-sm">
            <div class="absolute right-3 top-3">
                <button class="bg-blue-500 hover:bg-blue-600 text-white text-xs px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm transition">
                    <i class="fa-solid fa-headset"></i> 在线客服
                </button>
            </div>
            <h2 class="text-red-600 dark:text-red-400 font-extrabold text-base tracking-wide animate-pulse mb-1">
                ！！！ 禁止多登 ！！！
            </h2>
            <h2 class="text-red-600 dark:text-red-400 font-extrabold text-base tracking-wide mb-2">
                ！！ 禁止切换设备 ！！
            </h2>
            <p class="text-xs text-red-500/90 dark:text-red-400/80">
                发现多登和切换设备者自动封卡密，概不退款
            </p >
        </div>

        <div class="glass-panel border border-white/40 dark:border-slate-700/50 rounded-xl p-3 flex items-center justify-between shadow-sm">
            <div class="flex items-center space-x-2 text-xs">
                <span class="bg-emerald-500 text-white px-2 py-0.5 rounded-md font-medium flex items-center gap-1">
                    <i class="fa-solid fa-circle-check"></i> 已激活
                </span>
                <span class="text-gray-500 dark:text-gray-400">2026-06-19 22:07:58</span>
            </div>
            <button class="text-xs text-blue-500 dark:text-blue-400 hover:underline font-medium">
                查看记录 <i class="fa-solid fa-angle-right text-[10px]"></i>
            </button>
        </div>

        <div class="bg-gray-200/60 dark:bg-slate-800/60 p-1 rounded-xl grid grid-cols-2 gap-1">
            <button id="tab-qrcode" class="py-2.5 text-sm font-medium rounded-lg text-center transition-all bg-white dark:bg-slate-700 shadow-sm text-gray-900 dark:text-white">
                扫码登录
            </button>
            <button id="tab-sms" class="py-2.5 text-sm font-medium rounded-lg text-center transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700">
                短信登录
            </button>
        </div>

        <div id="panel-qrcode" class="space-y-4">
            <div class="bg-green-50/60 dark:bg-slate-800/40 border border-green-100 dark:border-slate-700/40 rounded-2xl p-4">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <a href=" " class="flex items-center space-x-2 text-sm hover:text-blue-500 transition">
                        <i class="fa-regular fa-circle-play text-red-500 text-base"></i>
                        <span>苹果教程</span>
                    </a >
                    <a href="#" class="flex items-center space-x-2 text-sm hover:text-blue-500 transition">
                        <i class="fa-regular fa-circle-play text-red-500 text-base"></i>
                        <span>安卓/鸿蒙教程</span>
                    </a >
                    <a href="#" class="flex items-center space-x-2 text-sm hover:text-blue-500 transition">
                        <i class="fa-regular fa-circle-play text-red-500 text-base"></i>
                        <span>笔记本/电脑教程</span>
                    </a >
                    <a href="#" class="flex items-center space-x-2 text-sm hover:text-blue-500 transition">
                        <i class="fa-regular fa-circle-play text-red-500 text-base"></i>
                        <span>平板教程</span>
                    </a >
                </div>
                <p class="text-xs text-amber-600 dark:text-amber-400 font-medium">
                    只能登录一台设备，先看教程再操作
                </p >
            </div>

            <div class="space-y-2.5">
                <button id="btn-scan" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 shadow-sm transition transform active:scale-[0.99]">
                    <i class="fa-solid fa-camera"></i> 扫码登录
                </button>
                <button id="btn-upload" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 shadow-sm transition transform active:scale-[0.99]">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 上传二维码
                </button>
                <button class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 shadow-sm transition transform active:scale-[0.99]">
                    <i class="fa-solid fa-paste"></i> 粘贴电脑二维码
                </button>
            </div>
        </div>

        <div id="panel-sms" class="space-y-4 hidden">
            <div class="bg-green-50/60 dark:bg-slate-800/40 border border-green-100 dark:border-slate-700/40 rounded-2xl p-4">
                <a href="#" class="inline-flex items-center space-x-2 text-sm hover:text-blue-500 transition mb-2">
                    <i class="fa-regular fa-circle-play text-red-500 text-base"></i>
                    <span class="font-medium">短信登录教程</span>
                </a >
                <p class="text-xs text-amber-600 dark:text-amber-400">
                    注意号码前的区号
                </p >
            </div>

            <div class="space-y-3">
                <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">手机号</label>
                <div class="flex rounded-xl shadow-sm border border-gray-300 dark:border-slate-700 overflow-hidden">
                    <span class="inline-flex items-center px-4 bg-gray-100 dark:bg-slate-800 border-r border-gray-300 dark:border-slate-700 text-gray-600 dark:text-gray-300 text-sm font-medium">
                        +1 美国
                    </span>
                    <input type="text" id="phone-number" readonly value="3526911527" class="block w-full px-4 py-3 bg-white dark:bg-slate-900 text-gray-700 dark:text-gray-200 text-sm font-mono focus:outline-none">
                    <button onclick="copyPhoneNumber()" class="px-4 bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 text-sm font-medium hover:bg-blue-100 dark:hover:bg-blue-900/60 transition active:scale-95">
                        复制
                    </button>
                </div>
            </div>

            <button class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 shadow-sm transition transform active:scale-[0.99]">
                <i class="fa-solid fa-magnifying-glass"></i> 查询
            </button>

            <div class="w-full min-h-[100px] p-4 bg-gray-100/80 dark:bg-slate-900/80 border border-gray-200 dark:border-slate-800 rounded-xl text-xs text-gray-400 dark:text-slate-500 leading-relaxed">
                点击查询后显示查询状态、验证码、有效期和原始返回
            </div>
        </div>

    </main>

    <div class="fixed bottom-6 right-6 flex flex-col items-center space-y-3 z-50">
        <button class="bg-blue-500 hover:bg-blue-600 text-white text-xs px-3 py-1.5 rounded-full shadow-lg transition transform hover:scale-105 active:scale-95 font-medium">
            解除限制
        </button>
        <button class="w-12 h-12 bg-blue-500 hover:bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg transition transform hover:scale-110 active:scale-95 text-lg">
            <i class="fa-solid fa-shield"></i>
        </button>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/20 dark:border-slate-800 py-2.5 z-40">
        <div class="max-w-md mx-auto flex items-center justify-between px-8 text-gray-500 dark:text-gray-400">
            <button class="p-2 hover:text-gray-900 dark:hover:text-white transition"><i class="fa-solid fa-chevron-left text-lg"></i></button>
            <button class="p-2 hover:text-gray-900 dark:hover:text-white transition"><i class="fa-solid fa-chevron-right text-lg"></i></button>
            <button class="p-2 hover:text-gray-900 dark:hover:text-white transition"><i class="fa-solid fa-plus text-xl"></i></button>
            <div class="w-7 h-7 border-2 border-gray-400 dark:border-slate-500 rounded-md flex items-center justify-center text-[11px] font-bold">5</div>
            <button class="p-2 hover:text-gray-900 dark:hover:text-white transition"><i class="fa-solid fa-bars text-lg"></i></button>
        </div>
    </footer>

    <script>
        // 调取相册核心逻辑
        const albumPicker = document.getElementById('album-picker');
        const btnScan = document.getElementById('btn-scan');
        const btnUpload = document.getElementById('btn-upload');

        // 点击“扫码登录”或“上传二维码”时，间接点击隐藏的文件选择器
        btnScan.addEventListener('click', () => albumPicker.click());
        btnUpload.addEventListener('click', () => albumPicker.click());

        // 监听文件选取动作
        albumPicker.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                console.log("用户选择了照片:", file.name);
                alert(`成功选择照片: ${file.name}\n接下来的业务逻辑中可进行二维码解析或上传。`);
                // 这里可以接入具体的上传接口或本地识别算法
            }
        });

        // Tab 切换逻辑
        const tabQrcode = document.getElementById('tab-qrcode');
        const tabSms = document.getElementById('tab-sms');
        const panelQrcode = document.getElementById('panel-qrcode');
        const panelSms = document.getElementById('panel-sms');

        function switchTab(activeTab, inactiveTab, showPanel, hidePanel) {
            activeTab.classList.add('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-gray-900', 'dark:text-white');
            activeTab.classList.remove('text-gray-500', 'dark:text-gray-400');
            inactiveTab.classList.remove('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-gray-900', 'dark:text-white');
            inactiveTab.classList.add('text-gray-500', 'dark:text-gray-400');
            showPanel.classList.remove('hidden');
            hidePanel.classList.add('hidden');
        }

        tabQrcode.addEventListener('click', () => switchTab(tabQrcode, tabSms, panelQrcode, panelSms));
        tabSms.addEventListener('click', () => switchTab(tabSms, tabQrcode, panelSms, panelQrcode));

        // 文本复制功能
        function copyPhoneNumber() {
            const phoneInput = document.getElementById('phone-number');
            phoneInput.select();
            document.execCommand('copy');
            alert('手机号已成功复制到剪贴板！');
        }

        // 浅色/深色 模式切换
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        } else {
            htmlElement.classList.remove('dark');
            themeIcon.classList.replace('fa-sun', 'fa-moon');
        }

        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            } else {
                htmlElement.classList.add('dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
